version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    AWS_ACCOUNT_ID: "128055991296"
    IMAGE_REPO_NAME: "app-ecs-demo"
    IMAGE_TAG: "latest"
    CONTAINER_NAME: "app-container"

phases:
  pre_build:
    commands:
      - echo "Iniciando autenticacion con Amazon ECR..."
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - echo "Repositorio ECR: $REPOSITORY_URI"
      - echo "Tag de imagen: $IMAGE_TAG"

  build:
    commands:
      - echo "Construyendo la imagen Docker..."
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG ./app

  post_build:
    commands:
      - echo "Publicando la imagen en ECR..."
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo "Generando imagedefinitions.json..."
      - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
